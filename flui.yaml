kind: Application
apiVersion: flui/v1

metadata:
  name: my-aspnet-app

build:
  strategy: dockerfile
  dockerfile: ./Dockerfile

deploy:
  port: 8080
  exposure: public
  healthcheck:
    path: /health
    port: 8080
  resources:
    profile: small
  scaling:
    min: 1
    max: 3
  domain:
    auto: true
    tls: true
    hostnameMode: ip
    certChallenge: http-01
    certificateProvider: lets-encrypt-staging
  env:
    - name: ASPNETCORE_ENVIRONMENT
      value: Production
